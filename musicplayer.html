<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JavaScript Music Player</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#141e30,#243b55);
      color:white;
    }

    .player{
      width:350px;
      background:#1f2937;
      border-radius:20px;
      padding:25px;
      box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    .cover{
      width:100%;
      height:250px;
      border-radius:15px;
      object-fit:cover;
      margin-bottom:20px;
    }

    .song-info{
      text-align:center;
      margin-bottom:20px;
    }

    .song-info h2{
      font-size:24px;
      margin-bottom:5px;
    }

    .song-info p{
      color:#cbd5e1;
      font-size:15px;
    }

    .progress-container{
      width:100%;
      height:6px;
      background:#475569;
      border-radius:10px;
      cursor:pointer;
      margin:15px 0;
    }

    .progress{
      height:100%;
      width:0%;
      background:#22c55e;
      border-radius:10px;
    }

    .time{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      margin-top:5px;
      color:#cbd5e1;
    }

    .controls{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:20px;
      margin-top:20px;
    }

    .controls button{
      border:none;
      background:#334155;
      color:white;
      padding:12px;
      border-radius:50%;
      cursor:pointer;
      font-size:18px;
      transition:0.3s;
    }

    .controls button:hover{
      background:#22c55e;
      transform:scale(1.1);
    }

    .volume{
      margin-top:20px;
    }

    .volume label{
      font-size:14px;
      display:block;
      margin-bottom:5px;
    }

    .playlist{
      margin-top:20px;
    }

    .playlist h3{
      margin-bottom:10px;
    }

    .playlist ul{
      list-style:none;
      max-height:120px;
      overflow-y:auto;
    }

    .playlist li{
      padding:10px;
      background:#334155;
      margin-bottom:8px;
      border-radius:10px;
      cursor:pointer;
      transition:0.3s;
    }

    .playlist li:hover,
    .playlist li.active{
      background:#22c55e;
    }
  </style>
</head>
<body>

  <div class="player">

    <img id="cover" class="cover" src="" alt="cover">

    <div class="song-info">
      <h2 id="title">Song Title</h2>
      <p id="artist">Artist</p>
    </div>

    <!-- Progress Bar -->
    <div class="progress-container" id="progress-container">
      <div class="progress" id="progress"></div>
    </div>

    <div class="time">
      <span id="current-time">0:00</span>
      <span id="duration">0:00</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button id="prev">⏮</button>
      <button id="play">▶</button>
      <button id="next">⏭</button>
    </div>

    <!-- Volume -->
    <div class="volume">
      <label for="volume">Volume</label>
      <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
    </div>

    <!-- Playlist -->
    <div class="playlist">
      <h3>Playlist</h3>
      <ul id="playlist"></ul>
    </div>

    <audio id="audio"></audio>

  </div>

  <script>
    const songs = [
      {
        title: "Dreams",
        artist: "Artist One",
        src: "songs/song1.mp3",
        cover: "https://picsum.photos/id/237/400/300"
      },
      {
        title: "Sunset",
        artist: "Artist Two",
        src: "songs/song2.mp3",
        cover: "https://picsum.photos/id/238/400/300"
      },
      {
        title: "Night Sky",
        artist: "Artist Three",
        src: "songs/song3.mp3",
        cover: "https://picsum.photos/id/239/400/300"
      }
    ];

    const audio = document.getElementById("audio");
    const title = document.getElementById("title");
    const artist = document.getElementById("artist");
    const cover = document.getElementById("cover");

    const playBtn = document.getElementById("play");
    const prevBtn = document.getElementById("prev");
    const nextBtn = document.getElementById("next");

    const progress = document.getElementById("progress");
    const progressContainer = document.getElementById("progress-container");

    const currentTimeEl = document.getElementById("current-time");
    const durationEl = document.getElementById("duration");

    const volumeControl = document.getElementById("volume");

    const playlistEl = document.getElementById("playlist");

    let songIndex = 0;
    let isPlaying = false;

    // Load Song
    function loadSong(song){
      title.innerText = song.title;
      artist.innerText = song.artist;
      cover.src = song.cover;
      audio.src = song.src;

      updatePlaylistActive();
    }

    // Play Song
    function playSong(){
      isPlaying = true;
      audio.play();
      playBtn.innerText = "⏸";
    }

    // Pause Song
    function pauseSong(){
      isPlaying = false;
      audio.pause();
      playBtn.innerText = "▶";
    }

    // Next Song
    function nextSong(){
      songIndex++;

      if(songIndex > songs.length - 1){
        songIndex = 0;
      }

      loadSong(songs[songIndex]);
      playSong();
    }

    // Previous Song
    function prevSong(){
      songIndex--;

      if(songIndex < 0){
        songIndex = songs.length - 1;
      }

      loadSong(songs[songIndex]);
      playSong();
    }

    // Update Progress
    function updateProgress(e){
      const { duration, currentTime } = e.srcElement;

      const progressPercent = (currentTime / duration) * 100;
      progress.style.width = `${progressPercent}%`;

      // Current Time
      let currentMinutes = Math.floor(currentTime / 60);
      let currentSeconds = Math.floor(currentTime % 60);

      if(currentSeconds < 10){
        currentSeconds = `0${currentSeconds}`;
      }

      currentTimeEl.innerText = `${currentMinutes}:${currentSeconds}`;

      // Duration
      let durationMinutes = Math.floor(duration / 60);
      let durationSeconds = Math.floor(duration % 60);

      if(durationSeconds < 10){
        durationSeconds = `0${durationSeconds}`;
      }

      if(durationSeconds){
        durationEl.innerText = `${durationMinutes}:${durationSeconds}`;
      }
    }

    // Set Progress
    function setProgress(e){
      const width = this.clientWidth;
      const clickX = e.offsetX;
      const duration = audio.duration;

      audio.currentTime = (clickX / width) * duration;
    }

    // Volume Control
    volumeControl.addEventListener("input", () => {
      audio.volume = volumeControl.value;
    });

    // Playlist
    function createPlaylist(){
      songs.forEach((song, index) => {
        const li = document.createElement("li");
        li.innerText = `${song.title} - ${song.artist}`;

        li.addEventListener("click", () => {
          songIndex = index;
          loadSong(song);
          playSong();
        });

        playlistEl.appendChild(li);
      });
    }

    function updatePlaylistActive(){
      const items = playlistEl.querySelectorAll("li");

      items.forEach((item, index) => {
        item.classList.remove("active");

        if(index === songIndex){
          item.classList.add("active");
        }
      });
    }

    // Events
    playBtn.addEventListener("click", () => {
      if(isPlaying){
        pauseSong();
      } else {
        playSong();
      }
    });

    prevBtn.addEventListener("click", prevSong);
    nextBtn.addEventListener("click", nextSong);

    audio.addEventListener("timeupdate", updateProgress);

    progressContainer.addEventListener("click", setProgress);

    // Autoplay Next Song
    audio.addEventListener("ended", nextSong);

    // Initialize
    loadSong(songs[songIndex]);
    createPlaylist();
  </script>

</body>
</html>
